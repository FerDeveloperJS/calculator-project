<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <h1>Calculator</h1>

    <div class="calculator">

        <div class="screen">

        </div>

        <div class="first-row">
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button>÷</button>
        </div>

        <div class="second-row">
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button>x</button>
        </div>

        <div class="third-row">
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button>-</button>
        </div>

        <div class="fourth-row">
            <button>0</button>
            <button>.</button>
            <button>=</button>
            <button>+</button>
        </div>
    </div>
</body>
</html>
